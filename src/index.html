  <!-- Polyfill: evita "Cannot read properties of null (reading 'getSelection')" en WebView/Capacitor -->
  <script>
    (function() {
      var safeContainer = (typeof document !== 'undefined' && document) ? (document.body || document.documentElement || {}) : {};
      var emptyRange = { collapsed: true, commonAncestorContainer: safeContainer };
      var mockSelection = {
        anchorNode: null, anchorOffset: 0, focusNode: null, focusOffset: 0,
        isCollapsed: true, rangeCount: 0, type: 'None',
        addRange: function(){}, removeAllRanges: function(){}, removeRange: function(){},
        getRangeAt: function(){ return emptyRange; }, toString: function(){ return ''; }
      };
      function safeGetSelection() {
        try {
          var sel = (typeof document !== 'undefined' && document.getSelection) ? document.getSelection() : null;
          return sel || mockSelection;
        } catch (e) { return mockSelection; }
      }
      if (typeof document !== 'undefined' && document) {
        try {
          var orig = document.getSelection;
          document.getSelection = function() {
            var r = orig ? orig.call(document) : null;
            return r || mockSelection;
          };
        } catch (e) {}
      }
      if (typeof window !== 'undefined' && window && !window.getSelection) {
        window.getSelection = safeGetSelection;
      }
    })();
  </script>
