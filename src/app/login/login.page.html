<ion-content class="login-content">
  <div class="login-container">

    <div class="logo-section">
      <h1>ACTIVA</h1>
      <p>Tu rehabilitación, en tus manos</p>
    </div>

    <div class="button-section">
      <ion-button
        expand="block"
        class="google-btn"
        (click)="loginConGoogle()">
        <ion-icon name="logo-google" slot="start"></ion-icon>
        Entrar con Google
      </ion-button>
    </div>

    <p class="footer-text">
      ¿No tienes acceso? Contacta a tu fisioterapeuta.
    </p>

  </div>
</ion-content>
