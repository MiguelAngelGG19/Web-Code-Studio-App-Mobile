<ion-content class="login-content">
  <div class="login-container">

    <div class="logo-section">
      <h1>ACTIVA</h1>
      <p>Tu rehabilitación, en tus manos</p>
    </div>

    <div class="input-section">
      <ion-item>
        <ion-label position="floating">Correo electrónico</ion-label>
        <ion-input
          type="email"
          [(ngModel)]="email"
          placeholder="ejemplo@correo.com">
        </ion-input>
      </ion-item>
    </div>

    <div class="button-section">
      <ion-button
        expand="block"
        class="login-btn"
        (click)="loginConCorreo()">
        Entrar
      </ion-button>
    </div>

    <p class="footer-text">
      ¿No tienes acceso? Contacta a tu fisioterapeuta.
    </p>

  </div>
</ion-content>
