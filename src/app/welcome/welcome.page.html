<ion-content [fullscreen]="true" class="welcome-content">
  <div class="welcome-overlay">
    <div class="branding">
      <div class="logo-wrapper">
        <img src="assets/icon/ico-activa.png" alt="ACTIVA" class="logo" />
      </div>
      <h1 class="app-name">ACTIVA</h1>
      <p class="tagline">Tu recuperación en movimiento</p>
    </div>
    <div class="actions">
      <ion-button expand="block" class="btn-continue" routerLink="/login">
        <ion-icon name="arrow-forward" slot="end"></ion-icon>
        Continuar
      </ion-button>
    </div>
  </div>
  <div class="bg-gradient"></div>
</ion-content>
