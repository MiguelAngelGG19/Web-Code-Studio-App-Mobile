<ion-header>
  <ion-toolbar>
    <ion-title>Perfil Usuario</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Perfil -->
  <ion-card>

    <ion-card-content class="ion-text-center">

      <ion-avatar style="margin:auto; width:90px; height:90px;">
        <img src="assets/avatar-default.png" alt="avatar">
      </ion-avatar>

      <h2>Carlos</h2>
      <p>Paciente desde Oct 2023</p>

      <!-- estadísticas -->
      <ion-grid>
        <ion-row>

          <ion-col>
            <ion-card>
              <ion-card-content class="ion-text-center">
                <h3>28</h3>
                <p>EDAD</p>
              </ion-card-content>
            </ion-card>
          </ion-col>

          <ion-col>
            <ion-card>
              <ion-card-content class="ion-text-center">
                <h3>75kg</h3>
                <p>PESO</p>
              </ion-card-content>
            </ion-card>
          </ion-col>

          <ion-col>
            <ion-card>
              <ion-card-content class="ion-text-center">
                <h3>Hombro</h3>
                <p>LESIÓN</p>
              </ion-card-content>
            </ion-card>
          </ion-col>

        </ion-row>
      </ion-grid>

    </ion-card-content>

  </ion-card>

  <!-- Opciones -->
  <ion-list>

    <ion-item>
      <ion-icon name="medkit-outline" slot="start"></ion-icon>
      <ion-label>
        <h2>Clínica ACTIVA Center</h2>
        <p>Fisioterapeuta: Dr. Garcia</p>
      </ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item>
      <ion-icon name="time-outline" slot="start"></ion-icon>
      <ion-label>Historial de sesiones</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item>
      <ion-icon name="document-text-outline" slot="start"></ion-icon>
      <ion-label>Documentos médicos</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item>
      <ion-icon name="notifications-outline" slot="start"></ion-icon>
      <ion-label>Notificaciones</ion-label>
      <ion-badge color="danger">1</ion-badge>
    </ion-item>

  </ion-list>

  <!-- botón cerrar -->
  <ion-button expand="block" color="danger" style="margin:20px;">
    Cerrar Sesión
  </ion-button>

</ion-content>
