<ion-header class="ion-no-border">
  <ion-toolbar class="notif-toolbar">
    <h1 class="notif-title-text" slot="start">Notificaciones</h1>
    <ion-buttons slot="end">
      <ion-button fill="clear" size="small" (click)="markAllRead()" *ngIf="hasUnread()">
        <span class="mark-all-text">Marcar todo</span>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="notif-content">

  <div *ngIf="loading" class="state-container">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Cargando...</p>
  </div>

  <div *ngIf="!loading && notifications.length === 0" class="state-container">
    <ion-icon name="notifications-off-outline" class="empty-icon"></ion-icon>
    <h3>Todo en orden</h3>
    <p>Aquí verás recordatorios de citas y mensajes de tu fisioterapeuta.</p>
  </div>

  <div *ngIf="!loading && notifications.length > 0" class="notif-list">
    <div
      *ngFor="let n of notifications"
      class="notif-item"
      [class.unread]="!n.isRead"
      (click)="markAsRead(n)"
    >
      <div class="notif-icon-wrap" [ngClass]="getIconClass(n.type)">
        <ion-icon [name]="getIcon(n.type)"></ion-icon>
      </div>
      <div class="notif-body">
        <p class="notif-item-title">{{ n.title }}</p>
        <p class="notif-item-body" *ngIf="n.body">{{ n.body }}</p>
        <p class="notif-item-date">{{ formatDate(n.createdAt) }}</p>
      </div>
      <div class="unread-dot" *ngIf="!n.isRead"></div>
    </div>
  </div>

</ion-content>
