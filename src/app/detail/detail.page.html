<ion-header class="ion-no-border">
  <ion-toolbar class="transparent-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/your-progress" text="" icon="chevron-back"></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center status-text">EN CURSO</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="exercise-content">
  <ion-grid class="ion-no-padding full-height-grid">
    
    <ion-row class="video-row ion-justify-content-center ion-align-items-center">
      <ion-col size="auto">
        <ion-fab-button class="play-btn-blur">
          <ion-icon name="play-sharp"></ion-icon>
        </ion-fab-button>
      </ion-col>
    </ion-row>

    <ion-row class="details-row">
      <ion-col size="12" class="ion-no-padding">
        <ion-card class="main-details-card ion-no-margin" mode="ios">
          <ion-card-content>
            <ion-row class="ion-justify-content-center">
              <ion-badge class="drag-handle-badge" mode="ios"></ion-badge>
            </ion-row>

            <ion-card-title class="exercise-title">Sentadilla Asistida</ion-card-title>
            
            <ion-row class="ion-margin-bottom">
              <ion-badge color="success" mode="ios" class="info-badge">3 series</ion-badge>
              <ion-badge color="primary" mode="ios" class="info-badge ion-margin-start">12 repeticiones</ion-badge>
            </ion-row>

            <ion-item lines="none" class="tip-item ion-margin-bottom">
              <ion-icon name="information-circle" slot="start" color="warning"></ion-icon>
              <ion-label class="ion-text-wrap">
                <ion-text color="dark"><strong>Consejo del terapeuta</strong></ion-text>
                <p>Mantén la espalda recta y utiliza el apoyo solo para mantener el equilibrio, no para impulsarte.</p>
              </ion-label>
            </ion-item>

            <ion-button expand="block" color="success" shape="round" class="action-btn" tab="report" href="/tabs/report">
              <ion-icon slot="start" name="checkmark-circle"></ion-icon>
              ¡Listo!
            </ion-button>
            
            <ion-button expand="block" fill="outline" color="danger" shape="round" class="action-btn ion-margin-top">
              <ion-icon slot="start" name="warning"></ion-icon>
              ¡Alerta / Me duele!
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

  </ion-grid>
</ion-content>
